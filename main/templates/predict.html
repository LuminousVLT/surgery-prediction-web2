{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgery AI Predictor | Smart Scheduling</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7fa; color: #333; }
        .container { max-width: 900px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #0d6efd; margin-bottom: 35px; font-weight: 600; border-bottom: 2px solid #eef2f7; padding-bottom: 15px; }
        h3 { margin-top: 30px; margin-bottom: 20px; color: #495057; font-size: 1.2rem; font-weight: 600; }
        
        .form-label { font-weight: 600; color: #444; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #dee2e6; padding: 10px; }
        
        .radio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 12px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #eee; 
        }
        .radio-item { display: flex; align-items: center; cursor: pointer; font-size: 0.95rem; }
        .radio-item input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }

        .btn-submit { width: 100%; margin-top: 30px; padding: 15px; background: #0d6efd; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; transition: 0.2s; }
        .btn-submit:hover { background: #0b5ed7; transform: translateY(-1px); }
        
        .select2-container--bootstrap-5 .select2-selection { border-radius: 8px !important; min-height: 42px; display: flex; align-items: center; }
        .info-badge { font-size: 0.75rem; background: #e0eefe; color: #0d6efd; padding: 4px 10px; border-radius: 20px; margin-left: 10px; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-microchip me-2"></i> Surgery Duration Prediction v2.0</h2>

    <form action="{% url 'predict_submit' %}" method="POST">
        {% csrf_token %}

        <h3><i class="fa-solid fa-user-injured me-2"></i> 1. ข้อมูลผู้ป่วย</h3>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">อายุ (ปี)</label>
                <input type="number" name="Age" class="form-control" placeholder="ระบุอายุ" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">ส่วนสูง (cm)</label>
                <input type="number" name="Height" class="form-control" placeholder="ระบุส่วนสูง" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">น้ำหนัก (kg)</label>
                <input type="number" step="0.1" name="BodyWeight" class="form-control" placeholder="ระบุน้ำหนัก" required>
            </div>
            <div class="col-md-12 mt-2">
                <label class="form-label d-block">เพศ</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="Gender" value="1" checked> ชาย
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="Gender" value="2"> หญิง
                </div>
            </div>
        </div>

        <h3 class="mt-4"><i class="fa-solid fa-user-doctor me-2"></i> 2. แพทย์และแผนก</h3>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">แพทย์ผู้ทำหัตถการ</label>
                <select name="Doctor" id="doctorSelect" class="form-select select2" required>
                    <option value="">-- ค้นหาชื่อแพทย์ --</option>
                    {% for doc in doctors %}
                    <option value="{{ doc.id }}" data-spec="{{ doc.spec }}">{{ doc.text }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">แผนกที่รับผิดชอบ</label>
                <select name="Specialty" id="specialtySelect" class="form-select select2" required>
                    <option value="">-- เลือกแผนก --</option>
                    {% for s in all_specialties %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mt-4 mb-3">
            <label class="form-label">3. รายการหัตถการ (เลือกได้มากกว่า 1 รายการ)</label>
            <select name="TreatmentCode" id="treatmentSelect" class="form-select select2" multiple="multiple" required disabled>
                <option value="">-- กรุณาเลือกแผนกก่อนเพื่อดูรายการหัตถการ --</option>
            </select>
        </div>

        <h3 class="mt-4"><i class="fa-solid fa-hospital me-2"></i> 3. ข้อมูลการผ่าตัด</h3>
        
        <div class="mb-4">
            <label class="form-label">สถานที่ (Location)</label>
            <div class="radio-grid">
                <label class="radio-item"><input type="radio" name="FacilityRmsNo" value="4OR" checked> 400 เตียง</label>
                <label class="radio-item"><input type="radio" name="FacilityRmsNo" value="OR"> 100 เตียง</label>
                <label class="radio-item"><input type="radio" name="FacilityRmsNo" value="ORHB"> Hybrid</label>
                <label class="radio-item"><input type="radio" name="FacilityRmsNo" value="EOUT"> นอกเวลา</label>
                <label class="radio-item"><input type="radio" name="FacilityRmsNo" value="OROUT"> 100 เตียง (นอกเวลา)</label>
                <label class="radio-item"><input type="radio" name="FacilityRmsNo" value="OROPH"> OROPH</label>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-5 mb-3">
                <label class="form-label">ประเภทเคส (Major/Minor)</label>
                <div class="radio-grid" style="grid-template-columns: 1fr 1fr;">
                    <label class="radio-item"><input type="radio" name="ORClassifiedType" value="1" id="caseMajor" checked> Major</label>
                    <label class="radio-item"><input type="radio" name="ORClassifiedType" value="2" id="caseMinor"> Minor</label>
                </div>
            </div>
            <div class="col-md-7 mb-3">
                <label class="form-label">ความเร่งด่วน</label>
                <div class="radio-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                    <label class="radio-item"><input type="radio" name="ORCaseType" value="1" checked> Emergency</label>
                    <label class="radio-item"><input type="radio" name="ORCaseType" value="2"> Urgency</label>
                    <label class="radio-item"><input type="radio" name="ORCaseType" value="3"> Elective</label>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">วิธีการระงับความรู้สึก (Anesthesia)</label>
            <div class="radio-grid">
                <label class="radio-item"><input type="radio" name="AnesthesiaType" value="ANES_GA" checked> GA (ดมยาสลบ)</label>
                <label class="radio-item"><input type="radio" name="AnesthesiaType" value="ANES_Local"> Local (ยาชาเฉพาะที่)</label>
                <label class="radio-item"><input type="radio" name="AnesthesiaType" value="ANES_TIVA"> TIVA</label>
                <label class="radio-item"><input type="radio" name="AnesthesiaType" value="ANES_None"> ไม่มีการดมยาสลบ</label>
                <label class="radio-item"><input type="radio" name="AnesthesiaType" value="ANES_Other"> อื่นๆ</label>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <label class="form-label">วันเวลาเริ่มผ่าตัด</label>
                <input type="datetime-local" name="StartTime" id="startTimeInput" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">ปัจจัยความยาก (Factor)</label>
                <select name="Complexity" class="form-select">
                    <option value="0.8">ง่าย (x0.8)</option>
                    <option value="1.0" selected>ปกติ (x1.0)</option>
                    <option value="1.3">ยาก (x1.3)</option>
                    <option value="1.5">ยากมาก (x1.5)</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit"><i class="fa-solid fa-bolt me-2"></i> คำนวณเวลาประเมินด้วย AI</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    // ตั้งค่าเวลาปัจจุบันให้อัตโนมัติ
    window.onload = function() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('startTimeInput').value = now.toISOString().slice(0, 16);
    };

    // ข้อมูลสำหรับ JavaScript ในการกรองหัตถการตามแผนก (ลบ type ออกไปเลย เพื่อความชัวร์)
    const treatmentsData = [
        {% for tx in treatments %}
        { id: "{{ tx.id }}", text: "{{ tx.text|escapejs }}", spec: "{{ tx.spec|escapejs }}" },
        {% endfor %}
    ];
</script>
<script src="{% static 'js/script.js' %}?v=2"></script>

</body>
</html>
